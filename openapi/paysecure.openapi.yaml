openapi: 3.1.0
info:
  title: Paysecure Merchant API
  version: 1.0.0
  summary: Merchant-facing pay-in, payout and platform APIs.
  description: "Bootstrapped from the developer-docs prototype and factored into shared components. Backend confirmed on 14 July 2026 that the documented endpoints and request/response shapes match the live API, so the paths, operations and examples are treated as accurate. Remaining hardening not covered by that confirmation: scalar field types, required flags, and completeness of the MethodCode/TransactionStatus enums. See SPEC_NOTES.md."
  license:
    name: Proprietary — Paysecure internal
    url: https://paysecure.com
servers:
  - url: https://api.paysecure.net/api/v1
    description: Sandbox and production share this base URL; the environment is selected by the Is Sandbox flag on the API key.
security:
  - bearerAuth: []
    brandId: []
tags:
  - name: ACH Payout
    description: ACH Payout endpoints.
  - name: Bank & local APMs
    description: Bank & local APMs endpoints.
  - name: Bank Transfers
    description: Bank Transfers endpoints.
  - name: Cards (S2S)
    description: Cards (S2S) endpoints.
  - name: Cashier & Session APIs
    description: Cashier & Session APIs endpoints.
  - name: Neosurf
    description: Neosurf endpoints.
  - name: Network tokenisation
    description: Network tokenisation endpoints.
  - name: Open Banking
    description: Open Banking endpoints.
  - name: Partial Refunds
    description: Partial Refunds endpoints.
  - name: Payout Manual Review
    description: Payout Manual Review endpoints.
  - name: Pre-authorization
    description: Pre-authorization endpoints.
  - name: Recurring & mandates
    description: Recurring & mandates endpoints.
  - name: Transaction Reporting
    description: Transaction Reporting endpoints.
  - name: Trust Score
    description: Trust Score endpoints.
x-tagGroups:
  - name: Core & platform
    tags:
      - Cashier & Session APIs
      - Partial Refunds
      - Payout Manual Review
      - Transaction Reporting
      - Trust Score
  - name: Payment methods
    tags:
      - ACH Payout
      - Bank & local APMs
      - Bank Transfers
      - Cards (S2S)
      - Neosurf
      - Open Banking
  - name: Features
    tags:
      - Network tokenisation
      - Pre-authorization
      - Recurring & mandates
