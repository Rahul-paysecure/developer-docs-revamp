[build]
  command = "npm run verify && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"

[functions]
  node_bundler = "esbuild"

[context.deploy-preview]
  command = "npm run verify && npm run build"

[context.branch-deploy]
  command = "npm run verify && npm run build"
